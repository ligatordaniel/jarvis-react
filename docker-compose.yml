services:
  shaula-sprintboot:
    image: shaula-sprintboot
    build:
      context: ../shaula-sprintboot
    container_name: shaula-sprintboot
    env_file: ../shaula-sprintboot/.env
    environment:
      SERVER_PORT: "8000"
      SHAULA_STATE_PATH: /data/shaula_state.json
      SHAULA_KAFRA_UPSTREAM: http://kafra-app:3000/api
      SHAULA_OCARINA_UPSTREAM: http://ocarina-sprintboot:8081
      SHAULA_PROXY_TIMEOUT_SECONDS: "3600"
    volumes:
      - shaula-data:/data
    restart: unless-stopped
    networks:
      - default
      - kafra_data_net

  kafka:
    image: apache/kafka:3.7.0
    container_name: jarvis-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
    volumes:
      - kafka-data:/var/lib/kafka/data

  ocarina-sprintboot:
    image: ocarina-sprintboot
    build:
      context: ../ocarina-sprintboot
    container_name: ocarina-sprintboot
    depends_on:
      - kafka
    environment:
      SERVER_PORT: "8081"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OCARINA_DOWNLOADS_DIR: /downloads
      OCARINA_YTDLP_COOKIES_FILE: /cookies/youtube.txt
      OCARINA_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      SHAULA_INTERNAL_VALIDATE_URL: http://shaula-sprintboot:8000/internal/validate
    volumes:
      - ocarina-downloads:/downloads
      - ./cookies:/cookies:ro

  bee-go:
    image: bee-go
    build:
      context: ../bee-go
    container_name: bee-go
    user: "0:0"
    environment:
      BEE_APPLICATIONS_DIR: /data/applications
    volumes:
      - /root/ObsidianVault/Projects/Bee-go/applications:/data/applications:ro
    restart: unless-stopped

  jarvis-vite:
    image: jarvis-vite
    build:
      context: .
      args:
        VITE_OCARINA_API_URL: /ocarina-api
        VITE_KAFRA_API_URL: /kafra-api
        VITE_SHAULA_API_URL: /shaula-api
        VITE_BEE_API_URL: /bee-api
    container_name: jarvis-vite
    depends_on:
      - shaula-sprintboot
      - ocarina-sprintboot
      - bee-go
    ports:
      - "5173:80"
    networks:
      - default
      - kafra_data_net

volumes:
  shaula-data:
  kafka-data:
  ocarina-downloads:

networks:
  kafra_data_net:
    external: true
